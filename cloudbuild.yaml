steps:
  # Step 1: Build Docker image
  # GOOGLE_API_KEY is injected from Secret Manager via secretEnv.
  # It is passed as a build-arg ONLY for the RAG ingest step during build.
  # It is NOT stored in any image layer (ARG value is not persisted after the RUN that uses it).
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - build
      - '--build-arg'
      - 'GOOGLE_API_KEY_ARG=$GOOGLE_API_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbonlens:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbonlens:latest'
      - '.'
    secretEnv: ['GOOGLE_API_KEY']

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/carbonlens'

  # Step 3: Deploy to Cloud Run
  # GOOGLE_API_KEY is injected at runtime from Secret Manager — NOT baked into image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carbonlens
      - '--image=gcr.io/$PROJECT_ID/carbonlens:$BUILD_ID'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=GOOGLE_API_KEY=google-api-key:latest'
      - '--set-env-vars=APP_ENV=production,RAG_DB_PATH=/app/rag/db,LOG_LEVEL=INFO'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'

# Secrets available to build steps
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/google-api-key/versions/latest
      env: GOOGLE_API_KEY

# Timeout: 20 minutes
timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

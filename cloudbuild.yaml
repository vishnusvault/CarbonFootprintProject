steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--secret'
      - 'id=google_api_key,env=GOOGLE_API_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbonlens:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbonlens:latest'
      - '.'
    secretEnv: ['GOOGLE_API_KEY']

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/carbonlens'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carbonlens
      - '--image=gcr.io/$PROJECT_ID/carbonlens:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=GOOGLE_API_KEY=google-api-key:latest'
      - '--set-env-vars=APP_ENV=production,RAG_DB_PATH=/app/rag/db,LOG_LEVEL=INFO'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'

# Secrets available to build steps (Cloud Build Service Account must have Secret Manager access)
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/google-api-key/versions/latest
      env: GOOGLE_API_KEY

# Build logs stored in GCS
logsBucket: 'gs://$PROJECT_ID-cloudbuild-logs'

# Timeout: 20 minutes (RAG ingestion + large Docker layers)
timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

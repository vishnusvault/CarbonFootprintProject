steps:
  # Step 1: Build Docker image
  # _GEMINI_KEY is fetched from Secret Manager via availableSecrets below.
  # It is exposed as the env var _GEMINI_KEY inside this build step.
  # Passed to Docker as a build-arg for the RAG ingest RUN step only.
  # ARG values are NOT persisted in image layers after the RUN that consumes them.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --no-cache \
          --build-arg GOOGLE_API_KEY_ARG=$$_GEMINI_KEY \
          -t gcr.io/$PROJECT_ID/carbonlens:$BUILD_ID \
          -t gcr.io/$PROJECT_ID/carbonlens:latest \
          .
    secretEnv: ['_GEMINI_KEY']

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/carbonlens'

  # Step 3: Deploy to Cloud Run
  # GOOGLE_API_KEY injected at runtime from Secret Manager — NOT baked into image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carbonlens
      - '--image=gcr.io/$PROJECT_ID/carbonlens:$BUILD_ID'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=GOOGLE_API_KEY=google-api-key:latest'
      - '--set-env-vars=APP_ENV=production,RAG_DB_PATH=/app/rag/db,LOG_LEVEL=INFO'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'

# Secret Manager binding
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/google-api-key/versions/latest
      env: '_GEMINI_KEY'

timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
